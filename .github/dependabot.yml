# Keeps GitHub Actions references current (#270 §3.3 — OpenSSF Scorecard
# Dependency-Update-Tool). Dependabot maintains the SHA pins by proposing
# version bumps as reviewable PRs.
#
# Only the github-actions ecosystem is declared here. The Python dependencies are
# managed with uv (pyproject.toml + uv.lock); Dependabot's uv support is still
# nascent, so the pip/uv ecosystem is deferred to the owner rather than opening
# potentially-broken lockfile PRs. (Deferral is deliberate — an orphaned uv-group
# PR from an earlier config, #3, is handled manually, not by re-enabling uv here.)
#
# Grouping (auto-merge policy 2026-07-10): minor + patch action bumps collapse into
# ONE weekly grouped PR (fewer PRs, atomic merges — self-clears via the auto-merge
# workflow). Majors stay UNGROUPED so each surfaces as its own PR for human review.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
