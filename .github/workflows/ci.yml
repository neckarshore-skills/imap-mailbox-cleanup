name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token (#270 §3.1 — Token-Permissions). This workflow
# only reads the repo and runs tests; no job needs write scope.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # All Action refs pinned to full commit SHAs (#270 §3.2 — Pinned-Dependencies).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Run tests (Docker IMAP starts as part of fixture)
        run: uv run pytest -v
