name: codeql

# Static analysis (#270 §3.4 — OpenSSF Scorecard SAST). Analyzes the real code
# surface: Python. build-mode is "none" because Python does not compile. Runs on
# push/PR to main and weekly, so drift is caught even without a PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

# Least-privilege default: read-only at the workflow level. The write scope
# (security-events, to upload findings to the Security tab) is granted only on
# the analyze job below — Scorecard Token-Permissions rewards job-scoped writes.
permissions:
  contents: read

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      # All Action refs pinned to full commit SHAs (Pinned-Dependencies).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
        with:
          category: "/language:${{ matrix.language }}"
